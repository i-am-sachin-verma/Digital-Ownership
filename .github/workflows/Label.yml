name: NSOC Label

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  manage-issues:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure NSOC label exists (Orange)
        uses: actions/github-script@v6
        with:
          script: |
            const labelName = "NSOC'26";
            const color = "FFA500";

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName
              });

              await github.rest.issues.updateLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName,
                color: color
              });

            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName,
                color: color,
                description: "NSOC 2026 Issues"
              });
            }

      - name: Detect NSOC variations and apply labels
        uses: actions/github-script@v6
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();

            // Handle general NSOC labels
            const keywords = ["nsoc", "nsoc26", "nsoc'26", "nsoc 26", "nsoc-26"];
            const isNSOC = keywords.some(k => title.includes(k));

            const labelsToAdd = [];
            if (isNSOC) {
              labelsToAdd.push("NSOC'26");
            }

            // Semantic prefix parsing
            if (title.startsWith("fix:") || title.includes("bug")) {
              labelsToAdd.push("bug");
            } else if (title.startsWith("feat:") || title.includes("feature")) {
              labelsToAdd.push("enhancement");
            } else if (title.startsWith("docs:") || title.includes("documentation") || title.includes("readme")) {
              labelsToAdd.push("documentation");
            } else if (title.startsWith("refactor:") || title.startsWith("perf:") || title.startsWith("style:")) {
              labelsToAdd.push("refactor");
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToAdd
              });
            }
